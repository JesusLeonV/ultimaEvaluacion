<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso al Sistema - BrickStore</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-card">
        <h2 style="margin-bottom: 10px;">¡Bienvenido de vuelta!</h2>
        <p style="color: gray; margin-bottom: 30px;">Ingresa tus credenciales corporativas</p>
        
        <form id="loginForm">
            <input type="email" id="email" placeholder="Correo electrónico (ej: admin@tiendalego.cl)" required>
            <input type="password" id="pass" placeholder="Contraseña de seguridad" required>
            <button type="submit">Iniciar Sesión</button>
            <a href="index.html" style="margin-top: 15px; color: var(--dark); text-decoration: none; font-size: 14px;">← Volver al catálogo</a>
        </form>
    </div>
    <script src="js/login.js" type="module"></script>
</body>
</html>
